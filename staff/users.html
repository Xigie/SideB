<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>用戶管理 —— SideB 唱片行員工系統</title>
<link rel="stylesheet" href="../assets/css/staff.css" />
</head>
<body class="staff" data-area="staff" data-staff-guard="true" data-depth="0">

<div class="staff-shell">
  <aside class="staff-sidebar">
    <a href="../shop/index.html" class="brand">SideB 唱片行</a>
    <div class="brand-sub">STAFF SYSTEM</div>
    <nav>
      <a href="index.html">總覽</a>
      <a href="profile.html">個人資訊</a>
      <a href="users.html" class="active">用戶管理</a>
      <a href="attendance.html">出勤紀錄</a>
      <a href="diary.html">工作日記</a>
      <a href="products.html">商品紀錄</a>
      <a href="delivery.html">送貨紀錄</a>
      <div class="group-label">電子郵件</div>
      <a href="mail/work.html" class="sub-link">工作內容</a>
      <a href="mail/service.html" class="sub-link">客服內容</a>
      <a href="mail/sent.html" class="sub-link">寄件備份</a>
    </nav>
    <div class="logout">
      <a href="#" data-logout>登出</a>
    </div>
  </aside>

  <div class="staff-main">
    <div class="staff-topbar">
      <h1>用戶管理</h1>
      <div class="search-box">
        <form>
          <input type="search" placeholder="搜尋商品、資訊…" />
          <button type="submit" aria-label="搜尋">🔍</button>
        </form>
      </div>
      <div class="whoami"></div>
    </div>

    <div class="staff-content">
      <div class="mail-tabs">
        <a href="#" class="active" data-users-tab="staff">員工</a>
        <a href="#" data-users-tab="customer">顧客</a>
      </div>

      <div data-users-panel="staff">
        <p class="users-note">目前所有可登入的員工帳號如下。</p>
        <div id="staff-users-list"></div>
      </div>

      <div data-users-panel="customer" style="display:none;">
        <p class="users-note">從送貨紀錄與客服信箱彙整出的顧客資料，僅供內部參考。</p>
        <div id="customer-users-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/staff-data.js"></script>
<script src="../assets/js/customer-data.js"></script>
<script src="../assets/js/search.js"></script>
<script>
  var staffListEl = document.getElementById("staff-users-list");
  var users = EchoStaffData.users;

  staffListEl.innerHTML = Object.keys(users).map(function (key) {
    var u = users[key];
    return (
      '<div class="panel">' +
        '<div class="profile-head">' +
          '<div class="avatar">' + u.avatarInitial + '</div>' +
          '<div>' +
            '<h2>' + u.displayName + '</h2>' +
            '<div class="role">' + u.roleDetail + '</div>' +
          '</div>' +
        '</div>' +
        '<dl class="kv-grid">' +
          '<dt>帳號</dt><dd>' + u.username + '</dd>' +
          '<dt>員工編號</dt><dd>' + u.employeeId + '</dd>' +
          '<dt>到職日期</dt><dd>' + u.joinDate + '</dd>' +
          '<dt>所屬門市</dt><dd>' + u.store + '</dd>' +
          '<dt>職務</dt><dd>' + u.duty + '</dd>' +
          '<dt>聯絡電話</dt><dd>' + u.phone + '</dd>' +
          '<dt>內部信箱</dt><dd>' + u.email + '</dd>' +
        '</dl>' +
      '</div>'
    );
  }).join("");

  var customerListEl = document.getElementById("customer-users-list");
  var customers = EchoCustomerData.customers;

  customerListEl.innerHTML = customers.map(function (c) {
    return (
      '<div class="panel">' +
        '<div class="profile-head">' +
          '<div class="avatar">' + c.name.charAt(0) + '</div>' +
          '<div>' +
            '<h2>' + c.name + '</h2>' +
            '<div class="role">顧客</div>' +
          '</div>' +
        '</div>' +
        '<dl class="kv-grid">' +
          '<dt>電話</dt><dd>' + (c.phone || "—") + '</dd>' +
          '<dt>Email</dt><dd>' + (c.email || "—") + '</dd>' +
          '<dt>地址</dt><dd>' + (c.address || "—") + '</dd>' +
          '<dt>備註</dt><dd>' + c.note + '</dd>' +
        '</dl>' +
      '</div>'
    );
  }).join("");

  document.querySelectorAll("[data-users-tab]").forEach(function (tab) {
    tab.addEventListener("click", function (e) {
      e.preventDefault();
      var target = tab.getAttribute("data-users-tab");
      document.querySelectorAll("[data-users-tab]").forEach(function (t) {
        t.classList.toggle("active", t === tab);
      });
      document.querySelectorAll("[data-users-panel]").forEach(function (p) {
        p.style.display = p.getAttribute("data-users-panel") === target ? "" : "none";
      });
    });
  });
</script>
<script src="../assets/js/staff-auth.js"></script>
</body>
</html>
