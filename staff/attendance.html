<link rel="stylesheet" href="../assets/css/staff.css" />
</head>
<body class="staff" data-area="staff" data-staff-guard="true" data-depth="0">

<div class="staff-shell">
  <aside class="staff-sidebar">
    <a href="../shop/index.html" class="brand">Side B 唱片行</a>
    <div class="brand-sub">STAFF SYSTEM</div>
    <nav>
      <a href="index.html">總覽</a>
      <a href="profile.html">個人資訊</a>
      <a href="users.html">用戶管理</a>
      <a href="attendance.html" class="active">出勤紀錄</a>
      <a href="diary.html">工作日記</a>
      <a href="products.html">商品紀錄</a>
      <a href="delivery.html">送貨紀錄</a>
      <div class="group-label">電子郵件</div>

    <div class="logout">

  </aside>

  <div class="staff-main">
    <div class="staff-topbar">
      <h1>出勤紀錄</h1>
      <div class="search-box">
        <form>
          <input type="search" placeholder="搜尋商品、資訊…" />
          <button type="submit" aria-label="搜尋">🔍</button>
        </form>
      </div>
      <div class="whoami"></div>
    </div>

    <div class="staff-content">
      <div class="panel">
        <h2>2026 年 7 月</h2>
        <table class="data-table">
          <tr><th>日期</th><th>上班</th><th>下班</th><th>狀態</th></tr>
          <tbody id="attendance-rows"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/staff-data.js"></script>
<script src="../assets/js/search.js"></script>
<script>
  var ATTENDANCE = {
    staff: [
      { date: "07/14（二）", in: "12:58", out: "21:03", status: "ok", label: "正常" },
      { date: "07/15（三）", in: "13:00", out: "21:00", status: "ok", label: "正常" },
      { date: "07/16（四）", in: "13:12", out: "21:05", status: "warn", label: "遲到 12 分" },
      { date: "07/17（五）", in: "12:55", out: "21:10", status: "ok", label: "正常" },

      { date: "07/20（一）", in: "—", out: "—", status: "bad", label: "公休" }
    ],
    yueshi: [
      { date: "07/14（二）", in: "13:02", out: "21:05", status: "ok", label: "正常" },
      { date: "07/15（三）", in: "—", out: "—", status: "bad", label: "排休" },

      { date: "07/20（一）", in: "—", out: "—", status: "bad", label: "公休" }
    ]
  };

  var rows = ATTENDANCE[SideBStaffData.currentUsername()] || ATTENDANCE.staff;
  document.getElementById("attendance-rows").innerHTML = rows.map(function (r) {
    return (
      "<tr><td class=\"mono\">" + r.date + "</td>" +
      "<td class=\"mono\">" + r.in + "</td>" +
      "<td class=\"mono\">" + r.out + "</td>" +
      "<td><span class=\"status-pill " + r.status + "\">" + r.label + "</span></td></tr>"
    );
  }).join("");
</script>
<script src="../assets/js/staff-auth.js"></script>
</body>
</html>
